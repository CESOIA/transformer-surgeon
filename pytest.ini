[pytest]
# Default collection targets the hardened suite so `pytest` is green out of the box.
# The legacy per-model scripts live under test/test_deprecated/ (see its README) and
# are kept for reference only; most are argparse CLI scripts, not pytest modules —
# see FRAMEWORK_PROBLEMS.md (T*).
testpaths = test/unit test/e2e
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --import-mode=importlib
markers =
    unit: fast pure-logic tests, no model downloads, no GPU
    e2e: end-to-end load -> compress -> (convert/export) flows
    slow: tests that take a long time (heavy compile/export or large models)
    download: requires downloading a model checkpoint from the Hugging Face Hub
    gpu: requires a CUDA device
    executorch: requires the `executorch` extra (xnnpack/qnn lowering)
    tensorrt: requires the `tensorrt` extra (torch-tensorrt) and CUDA
    qnn: requires the Qualcomm QNN SDK / backend (typically unavailable in CI)
    xfail_known_bug: pinned to a currently-broken framework behavior (see FRAMEWORK_PROBLEMS.md)
